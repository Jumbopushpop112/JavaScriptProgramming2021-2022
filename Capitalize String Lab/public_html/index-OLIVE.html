<html>
    <head>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body onload="main()">
        <script>
            function main(){
                //var str = prompt("Enter something silly and I will capitalize all the letters of it appropriately");
                var str = prompt("Enter something silly and I will captitalize it!"); 
                var result = capitalizeWords(str);
                console.log(result); 
            }
            function capitalizeWords(str){
                //starting variables
                var indexSpace = str.indexOf(" ");
                var curWord = "";
                var firstLetter = "";
                var cursor = 0;   
                var result = "";
                while(indexSpace !== -1){
                    //getting first letter. This will execute and get all the letters and capitalize them
                    firstLetter = str.substring(cursor, cursor + 1);
                    firstLetter = firstLetter.toUpperCase();
                    curWord = firstLetter + str.substring(cursor + 1, indexSpace);  
                    result += curWord + " ";  
                    cursor = indexSpace + 1;  
                    indexSpace = str.indexOf(" ", cursor);
                }  
                if (cursor > 0)  
                {
                    firstLetter = str.substring(cursor, cursor + 1);
                    firstLetter = firstLetter.toUpperCase();
                    curWord = firstLetter + str.substring(cursor + 1);  
                    result += curWord; 
                }
                else 
                    result = "Empty string entered";  
                return result;   
            } 
        </script>
    </body>
</html>
