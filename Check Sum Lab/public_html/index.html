    <body onload="main()">
        <script>
            //main init function that declares array and calls function
            function main(){
                const playersHand = [10,1,5,1,3];
                checkSum(playersHand);
            } 
            //function that deals with the sum. Prints the sum and prints bust if the sum is greater than 21
            function checkSum(playersHand){
               let sum = 0;
               let count = 0;
               for(let i = 0; i < playersHand.length; i++){
                   if(count < 1 && playersHand[i]===1){
                       sum += 11;
                       count += 1;
                   }
                   else if(count >= 1 && playersHand[i]===1){
                       sum += 1;
                       count += 1; 
                   }
                   else{ 
                       sum += playersHand[i];
                   }    
               }
               console.log(sum); 
               if(sum > 21){
                   console.log("Bust");
               }
               else{
                   console.log("No bust!");
               } 
           }
        </script>
    </body>
