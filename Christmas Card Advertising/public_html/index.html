<html>
    <head>
        <title>Christmas Card Webpage</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            body{
                background-color: green;
            }
            ul {
                list-style-type: none;
            }
            .flex-container {
                /*display: flex;*/
                 display: grid;
                 grid-template-columns: 400px 400px 400px 400px auto;
                 padding: 10px;
                 margin-top: 10px; 
            }
            .flex-container > img {
                background-color: #f1f1f1; 
                margin: 10px;
                padding: 20px;
                font-size: 30px;
            }
        </style>
    </head>
    <body onload="init()">
        <h1>Custom Christmas Cards (Hover to see the inside of them)</h1>
        <div class="flex-container" id="cardList">
            
        </div>
        <script>
            arrDescriptions = ["BowCard", "ChristmasIsCool", "ColorAntler", "ColorDot", "DogSnacks", "GemCard", "GlitterCard", "Grinch", "HappyHoliday", "HeartCard", "IsYou", "MerriestWishes", "NailedIt", "RainbowCard", "RedCard", "RedTree", "Rudolph", "ShromeHouse", "SweetChristmas", "TreeChristmas", "WaterColor"];
            function init(){ 
                createImages();
            }
            function createImages(){
                for(var i = 1; i < arrDescriptions.length; i++){ 
                    var image = document.createElement("IMG");
                    image.width = "130";  
                    image.height = "150";          
                    image.src = "Images/" + arrDescriptions[i] + ".jpg"; 
                    image.frontSource = "Images/" + arrDescriptions[i] + ".jpg"; ;
                    image.insideSource = "Images/CardInterior.jpg";
                    image.addEventListener("mouseover", showCardImage);
                    image.addEventListener("mouseout", hideCardImage);
                    document.getElementById("cardList").append(image);
                }  
            }
            function showCardImage(){  
                this.src = this.insideSource; 
            } 
            function hideCardImage(){
                this.src = this.frontSource;   
            }
        </script>
    </body>
</html>
