<html>
    <head>
        <title>Combined Drag and Drop Lab</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            #answerArea{
                float: right;
            }
            #answerBox{ 
                width: 250px;
                height: 250px;
                padding: 10px;
                border: 4px solid black;
                text-align: center;
                vertical-align: middle;
                display: table-cell;
            }
            #trashBox{
                width: 250px;
                height: 250px;
                padding: 10px;
                border: 4px solid black;
                text-align: center;
                vertical-align: middle;
                display: table-cell;
            }
            #answerBox .options{
                border: 4px solid black;
                text-align: center;
                display: inline-block; 
            }
            #submitButton{
                height: 50px;
                width: 100px;
                border: 1px solid black;
            }
            #selections{
                display: flex;
            }
            .options{
                text-align: center;
                height: 175px;
                width: 150px;
                border: 4px solid black;
                margin: 10px;
                line-height: 175px;
                font-size: 20px;
            }
        </style>
    </head>   
    <body onload="init()">
        <h2 id="targetNumber"></h2>   
        <div id="answerArea">
            <h2>Place Your Answer Box Here</h2>
            <div id="answerBox"></div><br>
            <h2>Trash Can</h2>
            <div id="trashBox"></div><br>
        </div>
        <label>Enter the amount of tiles to generate (drop them on top of each other to sum them up and add another tile)</label><br><br>
        <input type="text" id="amountToMake"><br><br>
        <button id="generateButton">Generate</button>
        <div id="selections">
            
        </div>
        <script>
            function init(){  
                var randomNum = parseInt((Math.random() * 25) + 1);
                document.getElementById("amountToMake").value = "";
                document.getElementById("generateButton").addEventListener("click", function(){
                    var amount = parseInt(document.getElementById("amountToMake").value);
                    generateDivs(amount, randomNum);
                });            
                document.getElementById("targetNumber").innerHTML = "Target Number - " + randomNum;
                document.getElementById("answerBox").addEventListener("drop", function(event){
                       event.preventDefault();   
                       var data = event.dataTransfer.getData("text");                    
                       data = parseInt(data);
                       if(data === randomNum){
                           event.target.appendChild(document.getElementById(data));
                           event.target.style.borderColor = "green";
                           event.target.style.borderWidth = "4px";
                       }else{
                           event.target.style.borderWidth = "4px";
                           event.target.style.borderColor = "red";
                       }

                 });
                 document.getElementById("answerBox").addEventListener("mouseover", function(event){
                       event.target.style.backgroundColor = "yellow"; 
                 });
                 document.getElementById("answerBox").addEventListener("mouseout", function(event){
                        event.target.style.backgroundColor = "white";
                 });
                 document.getElementById("answerBox").addEventListener("dragover", function(event){
                      event.preventDefault();   
                 });
                 document.getElementById("trashBox").addEventListener("drop", function(event){
                        event.preventDefault();   
                        var data = event.dataTransfer.getData("text");
                        document.getElementById(data).remove();   
                        generateDivs(1);

                 });
                 document.getElementById("trashBox").addEventListener("dragover", function(event){
                      event.preventDefault();   
                 });
            } 
            function generateDivs(amount, randomNum){
               var sum = 0;
               for(var i = 0; i<amount; i++){ 
                    var num = parseInt(Math.random() * 5) + 1;
                    var numBox = document.createElement("DIV");
                    numBox.id = num;
                    numBox.innerHTML = num;
                    sum += num;
                    numBox.className = "options";
                    numBox.draggable = true;
                    numBox.addEventListener("dragstart", function(event){
                       event.dataTransfer.setData("text", event.target.id);
                    });
                    numBox.addEventListener("mouseover", function(event){
                       event.target.style.backgroundColor = "yellow"; 
                    });
                    numBox.addEventListener("mouseout", function(event){
                        event.target.style.backgroundColor = "white";
                    });
                    numBox.addEventListener("drop", function(event){
                        event.preventDefault();
                        var droppedNum = event.dataTransfer.getData("text"); //get number from dropped box
                        droppedNum = parseInt(droppedNum);
                        document.getElementById(droppedNum).remove();
                        var curNum = event.target.innerHTML;
                        curNum = parseInt(curNum);
                        event.target.id = droppedNum + curNum;
                        event.target.innerHTML = droppedNum + curNum;
                        generateDivs(1);
                    });
                    numBox.addEventListener("dragover", function(event){
                      event.preventDefault();    
                 });
                 document.getElementById("selections").append(numBox);     
               }
//               if(sum < randomNum){   
//                   console.log("Not solvable!");
//               }else{
//                   console.log("Solvable"); 
//               }
            }
        </script>
    </body>
</html>
