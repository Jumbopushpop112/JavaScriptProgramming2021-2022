    <body>
        <script>
            var input = 6;
            //create an array from the numberes of 1 to n which is the input variable
            var factorialArray = [];
            for(var i = 1; i<input+1; i++){
                factorialArray.push(i);
            }
            //the array will now hold the numbers all multiplited by each other from 1 to n 
            factorialArray = factorialArray.reduce((previousValue, currentValue) => previousValue * currentValue);   
            console.log(factorialArray);  
        </script>
