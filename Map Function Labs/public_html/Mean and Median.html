    <body>
        <script>
            var input = [12, 46, 32, 64];
            const meanArray = input.reduce(findAverage);
            function findAverage(total, num){
                return total + num;
            }
            input.sort();
            findMedian();
            function findMedian(){   
                //if the array has an even length, get middle two values and divide by 2
                var median;
                if(input.length % 2 === 0){
                    const middle = input.length/2;
                    median = (input[middle] + input[middle-1])/2;
                }
                //else, if the array has an odd length, divide the length by two and round to get the median
                else{
                    median = input[Math.floor(input.length/2)];
                }
                return median;
            }
            console.log("Mean is: " + meanArray/input.length);
            console.log("Median is: " + findMedian());
        </script>
