    <body>
        <script>
            const input = "Every developer likes to mix kubernetes and javascript";
            var arrString = input.split(" ");
            arrString = arrString.map(getCharactersInBetween);
            function getCharactersInBetween(string){
                if(string.length > 3){
                    //get the length of the characters between the strings
                     var charsInBetween = string.substring(1,string.length-1).length;
                     //return the first letter + the length of the chars + the last letter
                     return string.charAt(0) + charsInBetween + string.charAt(string.length-1); 
                }
                else{
                    return string;   
                }           
            }
            //join the strings by using a space
            arrString = arrString.join(" ");
            console.log(arrString);
        </script>
