<html>
    <head>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            h1{
                font-size: 45px;
            }
        </style>
    </head>
    <body>
        <h1>Ball Pool</h1>
        <canvas></canvas>
        <script>
           var gravity = 1;         
           var canvas = document.querySelector("canvas");
           canvas.width = window.innerWidth;
           canvas.height = window.innerHeight;
           var c = canvas.getContext("2d");
           //canvas.style.backgroundColor = "lightblue";
           var innerWidth = window.innerWidth;
           var innerHeight = window.innerHeight;
//           function getRandomColor(){
//               var letters = '0123456789ABCDEF';
//               var color = '#';
//               for(var i = 0; i < 6; i++){
//                   color += letters[Math.floor(Math.random() * 16)];
//               }  
//               return color; 
//           }
           var mouse = {
               x: undefined,
               y: undefined
           };
           var maxRadius = 70; 
           //get coordinates
           var colorArray = ["#F42016", "#F48516", "#F4E316", "#34F416", "#46A3F0", "#4816F4", "#B116F4"];
           window.addEventListener("mousemove", function(event){    
                mouse.x = event.x;
                mouse.y = event.y;
           });
//           window.addEventListener("resize", function(){
//               canvas.width = window.innerWidth;
//               canvas.height = window.innerHeight;
//               init();
//           });
           //draw circles
           var elasticity = 0.8;
           //elasticity = Math.random() * (0.5) + 0.45;
           //draw the circles here
           function Circle(x,y,dx,dy,radius,gravity){
               this.x = x;
               this.y = y;
               this.dx = dx;
               this.dy = dy;
               this.radius = radius;
               this.minRadius = radius;
               //getting a random value from the color array for the color
               this.color = colorArray[Math.floor(Math.random() * colorArray.length)];
               //this.opacity = opacity;
               this.gravity = gravity;
               this.draw = function(){
                   c.beginPath();
                   //c.globalAlpha = this.opacity;
                   c.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                   c.fillStyle = this.color;
                   c.strokeStyle = "blue";
                   c.fill();
                   c.stroke();
               };
               //check for collison on walls
               this.update = function(){ 
                   //check to see if the balls is touching the right wall
                   //if so, make it bounce and continue until it hits the ground
                  if(this.x + this.radius > innerWidth || this.x -this.radius < 0){
                       this.dx *= -elasticity;
                       this.dy *= 0.9;
                       if(this.x < this.radius){
                           this.x = radius;
                       }else{
                         this.x = window.innerWidth - this.radius;   
                       }
                  }
                  //check to see if the ball is touching the bottom wall and if so, have it bounce but decrease the elasticity after each bounce (similar to a real bounce)
                  //after a while, if the delta y value is less than 5, then stop the ball from bouncing
                  if(this.y + this.radius >= innerHeight || this.y - this.radius < 0){
                       if(Math.abs(this.dy) < 5){
                          this.dy = 0; 
                          this.dx *= 0.25;
                       }
                       //else, keep moving the ball
                       this.dy *= -elasticity;
                       this.gravity *= 1.1; 
                       if(this.y < this.radius){
                           this.y = this.radius;
                       }
                       else{
                         this.y = window.innerHeight - this.radius;
                       }
                  }
                  else{ 
                      this.dy += gravity; 
                  }
                  //constantly increase the value
                  this.x += this.dx;
                  this.y += this.dy;
                  //mouse interactivity
//                  if(mouse.x - this.x < 50 && mouse.x - this.x > -50 && mouse.y - this.y < 50 && mouse.y - this.y > -50)
//                  {
//                      if(this.radius < maxRadius){
//                          this.radius += 1;
//                      }
//                      this.radius += 1;
//                  }
//                  
//                  else if(this.radius > this.minRadius){
//                     this.radius -= 1; 
//                  }
                  this.draw();
               }; 
           }
           
           //draw the circle
           var circleArray = [];
           //make the circles here
           //generate ten circles each with a random radius,x,y,dx, and dy value
          function init(){ 
              circleArray = [];
               for(var i = 0; i<10; i++){ 
                   var radius = (Math.random() * 65) + 30;
                   var x = Math.random() * (innerWidth - radius * 2) + radius;
                   var y = Math.random() * (innerHeight - radius * 2) + radius;
                   var dx = (Math.random() - 0.5) * 6;
                   var dy = (Math.random() - 0.5) * 6; 
                   circleArray.push(new Circle(x,y,dx,dy,radius,gravity));
                } 
          } 
          //animate circles
          function animate(){   
               requestAnimationFrame(animate);
               c.clearRect(0,0, innerWidth, innerHeight);
               for(var i = 0; i<circleArray.length; i++){
                   circleArray[i].update();
               }
          }   
          init();
          animate(); 
        </script>
    </body>
    
</html>
