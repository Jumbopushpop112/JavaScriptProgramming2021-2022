    <body>
        <script>
            var string = "The quick brown fox jumps over the lazy dog";  
            determinePangram(string);
            function determinePangram(string){
                var count = 0;
                string = string.toLowerCase();
                const A = "a".charCodeAt(0);
                //building alphabet array
                for (let i = 0; i < 26; ++i){
                    var letterString = String.fromCharCode(A+i);
                    //letterString = letterString.toLowerCase();
                    if(string.includes(letterString)){
                        count++;
                    }
                }                        
                if(count === 26){
                    console.log("Pangram!");
                }
                else{
                    console.log("Not a pangram!");
                }
            }
        </script>
    </body>
