        <script>
            var words = ["foo", "bar", "baz", "Foo", "FOO"];
            removeWord(words, "foo");
            function removeWord(arrWords, word){
                var newArray = [];
                for(var i = 0; i<arrWords.length; i++){
                    curWord = arrWords[i];
                    curWord = curWord.toLowerCase();
                    if(curWord !== word){
                        newArray.push(curWord);
                    }
                }
                console.log(newArray);
            }
        </script>
