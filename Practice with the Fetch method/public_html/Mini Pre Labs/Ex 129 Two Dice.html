<html>
    <head>
        <title>Two Dice Simulation</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            table, th, td{
                border:1px solid black;
                text-align: center;
                border-collapse: collapse; 
            }
        </style>
    </head>
    <body onload="init()">
        <table id="myTable">
            <tr>
                <th>Sums</th> 
                <th>Total</th>
                <th>Percentage</th>
                <th>Expected Percentage</th>
            </tr>
        </table>
        <script>
            function init(){
                generateRolls();
            }
            function generateRolls(){
                //roll the dice in the for loop, then create rows in the table with the values and insert them
                diceDictionary = {};
                for(var i = 0; i<1000; i++){
                    const roll1 = parseInt(Math.random()*6+1);
                    const roll2 = parseInt(Math.random()*6+1);
                    var sum = roll1 + roll2;
                    if(!diceDictionary[sum]){
                        diceDictionary[sum]=1; 
                    }
                    else{ 
                       diceDictionary[sum] +=1; 
                    }
                }
                console.log(diceDictionary);  
                expectedPercent = {2:(1/36)*100, 3:(2/36)*100, 4:(3/36)*100, 5:(4/36)*100, 6:(5/36)*100, 7:(6/36)*100, 8:(5/36)*100,
                9:(4/36)*100, 10:(3/36)*100, 11:(2/36)*100, 12:(1/36)*100};    

                var table = document.getElementById("myTable");
                for(var i = 2; i<13; i++){  
                       var row = table.insertRow(); 
                       row.insertCell().innerText = i;
                       row.insertCell().innerText = diceDictionary[i];
                       row.insertCell().innerText = (diceDictionary[i]/100 * 10).toFixed(2);
                       row.insertCell().innerText = expectedPercent[i].toFixed(2);
                }
            }
        </script>
    </body>
</html>
