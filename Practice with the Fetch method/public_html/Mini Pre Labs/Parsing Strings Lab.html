<html>
    <head>
        <title>Practice Parsing Strings</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body> 
        <script>
             fetch("Dogs.csv") 
                    .then((response) => {
                    if (!response.ok) {
                        throw response.status;
                    }

                    return response.text();
                })
                .then((body) => body.split("\r\n"))
                .then((lines) => {
                    const headers = lines.shift().split(",");
                    const dogList = [];
                    
                    for(const line of lines){
                        const parts = line.split(",");
                        const dog = {};
                        for(let i = 0; i<parts.length; i++){
                            const colum_name = headers[i];
                            dog[colum_name] = parts[i];  
                            console.log(headers[i] + ":" + parts[i]);
                        }
                        console.log(dog);
                        dogList.push(dog);  
                    }
                    return dogList;
                })
                .then(console.log)        
                .catch((err) => {  
                    console.error("Didn't get dogs: " + err);
                });
        </script>
    </body>
</html>
