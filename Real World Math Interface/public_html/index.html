<html>
    <head>
        <title>Real World Math Calculator</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body onload="init()">
        <!--User interface -->
        <h3>Enter your pay per hour and then enter the amount of hours you worked!</h3>    
        <label for="hoursWorked">Enter hours worked:</label>
        <input id="hoursWorked" type="number"><br>
        <label for="payPerHour">Enter your salary per hour:</label>
        <input id="payPerHour" type="number"><br> 
        <label for="tipEarnings">Enter your tip earnings (if any):</label>
        <input id="tipEarnings" type="number"><br> 
        <p><button type="button" onclick="calculateEarnings()" id="calcEarnings">Calculate your earnings</button></p>  
        <label for="resultingArea">Total amount earned this paycheck:</label>  
        <input type="text" id="finalPaycheckAmount" name="finalAmount">
        <script>    
            function init(){         
                //add event listener to calculate earnings on click
               document.getElementById("calcEarnings").addEventListener("click", calculateEarnings);  
            }
            function calculateEarnings(){        
                //function that does the math to get the earnings, hours worked and the tips 
                var hoursWorked = parseFloat(document.getElementById("hoursWorked").value); 
                var payPerHour = parseFloat(document.getElementById("payPerHour").value);
                payPerHour = payPerHour.toFixed(2); 
                var tipEarnings = parseFloat(document.getElementById("tipEarnings").value); 
                var totalEarnings = (hoursWorked * payPerHour) + tipEarnings;
                totalEarnings = totalEarnings.toFixed(2);     
                document.getElementById("finalPaycheckAmount").value = "$" + totalEarnings;   
            }                 
        </script> 
    </body>
</html>
