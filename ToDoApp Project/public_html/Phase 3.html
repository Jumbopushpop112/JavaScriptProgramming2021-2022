<html lang="en">

<head>
    <title>My To Do List</title>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: gray;
            font-family: sans-serif;
        }
        
        #itemsList {
            border: 1px solid black;
            background-color: white;
            padding-left: 0px;
        }
        
        #itemsList li {
            list-style-type: none;
            margin: 1em;
            padding-bottom: 1em;
        }
        .completed {
            color: gray; 
            text-decoration: line-through; 
        } 
        
        #itemsList li:last-child {
            border-bottom: none;
        }
        
        #itemsList li input {
            margin-right: 2em;
        }
    </style>
</head>
<body onload = "init()">   
    <h1>Things I need to do</h1>
    <label>Type in the box to add it your list!</label>
    <input type="text" id="userTask">
    <button type="button" id="addButton">Click to add!</button>
    <select name="tasks" id="myTasks">
        <option>Remove  Item</option>
    </select> 
    <ul id="itemsList"> 
        
    </ul>
    <script>
        //init function
        var arrTasks = [];
        function init(){ 
            getLocalStorage();
            walkThroughStorage();
            document.getElementById("addButton").addEventListener("click", createTaskElements);
            document.getElementById("userTask").value = "";
            //window.onload = window.localStorage.clear();
        }
        //create elements and add them to the unordered list  
        //set attributes
        function getLocalStorage()  
        { 
            var noteCurrentStorage = localStorage.getItem("Description:");  
               if(noteCurrentStorage !== null)  
                  {
                     arrCurrentStorage = JSON.parse(noteCurrentStorage); 
                    
                     for(var i =0; i<arrCurrentStorage.length; i++)
                     {
                        arrTasks.push(arrCurrentStorage[i]); 
                     }
                  } 
               else
                  {
                    arrTasks = [];    
                  }   
        }
        function walkThroughStorage()   
        {
            var list = document.getElementById("itemsList");
            for(var i = 0; i<arrTasks.length; i++)
            { 
               var date = new Date(arrTasks[i].date); 
               var hours = date.getHours();   
               var li = document.createElement("li"); 
               var tempSpanTag = document.createElement("SPAN");
               var input = document.createElement("INPUT"); 
               input.type = "checkbox";
               li.addEventListener("click", crossOut);
               var minutes = date.getMinutes();
               var ampm = (hours >= 12) ? "PM" : "AM";
               if(hours > 12){
                   hours -= 12; 
               }   
               tempSpanTag.innerHTML = arrTasks[i].name + " " +  parseInt(date.getMonth()+1) + "/" + date.getDate() + "/" + date.getFullYear() + " " + " " + hours + ":" + minutes + " " + ampm;
               li.appendChild(input);
               li.appendChild(tempSpanTag);      
               list.appendChild(li);
               var optionText = document.createElement("OPTION");
               optionText.innerHTML = arrTasks[i].name; 
               optionText.addEventListener("click", deleteTask); 
               document.getElementById("myTasks").append(optionText);
               document.getElementById("itemsList").append(li);   
            }  
        }
        function createTaskElements(){
                var userText = document.getElementById("userTask").value; 
                const date =  new Date();
                let taskItem = {
                    name: userText, 
                    date: date,
                    isChecked: false  
                }; 
                 arrTasks.push(taskItem);
                 var task = document.createElement("LI");  
                 task.id = "task";
                 var input = document.createElement("INPUT"); 
                 input.type = "checkbox";
                 input.id = "chore";   
                 var span = document.createElement("SPAN");
                 var hours = date.getHours();
                 var minutes = date.getMinutes();
                 var seconds = date.getSeconds();   
                 var ampm = (hours >= 12) ? "PM" : "AM";
                 if (hours > 12){
                     hours = hours - 12;
                 }
                 if (hours < 1){
                     hours = hours + 12;
                 }
                span.innerHTML = userText + " " + parseInt(date.getMonth()+1) + "/" + date.getDate() + "/" + date.getFullYear() + " " + " " + hours + ":" + minutes + " " + ampm; 
                 //span.innerHTML = userText + " " + parseInt(date.getMonth()+1) + "/" + date.getDate() + "/" + parseInt(date.getFullYear()+1) + " " + date.toLocaleTimeString('en-US');  
                 localStorage.setItem("Description:", JSON.stringify(arrTasks));
                 //localStorage.setItem("isChecked", false);  
                 //localStorage.setItem("date", date);
                 task.appendChild(input);  
                 task.appendChild(span);  
                 task.addEventListener("click", crossOut);
                 var optionText = document.createElement("OPTION");
                 optionText.innerHTML = taskItem.name; 
                 optionText.addEventListener("click", deleteTask); 
                 document.getElementById("myTasks").append(optionText);
                 document.getElementById("itemsList").append(task);  
             }     
        //set the class name of the list item whenever it is clicked to completed
        function crossOut(){   
             this.className = "completed";
             this.querySelector("input").checked = true;
        }  
        function deleteTask(event){
            var targetEl = event.target; 
            var tempSelectTag = document.getElementById("myTasks");
            var selectedIndex = tempSelectTag.selectedIndex;
            tempSelectTag.removeChild(tempSelectTag[selectedIndex]);
            arrTasks.splice(selectedIndex-1, 1); 
            localStorage.setItem("Description:", JSON.stringify(arrTasks));
            document.getElementById("userTask").value = "";
            const listContainer = document.getElementById('itemsList');
               while(listContainer.children.length > 0) {
                    listContainer.children[0].remove();   
               } 
            walkThroughStorage();
        }       
    </script> 
</body> 

</html>
