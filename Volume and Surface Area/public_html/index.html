<html>
    <head>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body onload="init()">
        <script>
            //init function that calls the functions and generates the dimensions
            function init(){
                var height = parseInt(Math.random()* (11) +30); //30-40
                var width = parseInt(Math.random()* (21) +20); //20-30
                var length = parseInt((Math.random()* (6) +15)); //15-20
                var radius = parseInt((Math.random()* (6) +5)); //5-10 
                var slantHeight = parseInt(Math.random()* (21) +20); //20-30
                calcVolumeSphere(radius);
                var surfaceAreaSphere = calcSurfaceAreaSphere(radius);
                console.log("Surface area of sphere is " + surfaceAreaSphere);
                calcVolumeRectangularPrism(length,width,height);  
                var surfaceAreaRectangularPrism = calcSurfaceAreaRectangularPrism(length,width,height);  
                console.log("Surface area of rectangular prism is " + surfaceAreaRectangularPrism); 
                calcVolumeCone(height, radius, height);      
                var surfaceAreaCone = calcSurfaceAreaCone(slantHeight, radius);  
                console.log("Surface area of cone is " + surfaceAreaCone); 
            }     
            //functions that calculate the math. They receive the values to calculate with and then the number is rounded to two decimal places. 
            function calcVolumeSphere(radius){
                console.log("Radius of sphere is " + radius);
                var volume = parseFloat(4/3 * Math.PI * Math.pow(radius, 3)).toFixed(2);
                console.log("Volume of sphere is " + volume);                  
            }  
            function calcSurfaceAreaSphere(radius){
                console.log("Radius of sphere is " + radius);
                return parseFloat(4 * Math.PI * Math.pow(radius, 2)).toFixed(2);
             }
            function calcVolumeRectangularPrism(length,width,height){
                console.log("Length of rectangular prism is " + length);
                console.log("Width of rectangular prism is " + width);
                console.log("Height of rectangular prism is " + height);
                var volume = parseFloat(length * width * height).toFixed(2); 
                console.log("Volume of rectangular prism is " + volume);
            }
            function calcSurfaceAreaRectangularPrism(length,width,height){
                console.log("Length of rectangular prism is " + length);
                console.log("Width of rectangular prism is " + width);
                console.log("Height of rectangular prism is " + height);
                return parseFloat(2 * ((width*length) + (height*length) + (height*width))).toFixed(2); 
            }
            function calcVolumeCone(height,radius){
               console.log("Height of cone is " + height);
               console.log("Radius of cone is " + radius);
               var volume = parseFloat(1/3 * height * Math.pow(radius, 2)).toFixed(2);
               console.log("Volume of cone is " + volume); 
            }
            function calcSurfaceAreaCone(slantHeight, radius){ 
               console.log("Slant height of cone is " + slantHeight);
               console.log("Radius of cone is " + radius);  
               return parseFloat((Math.PI * Math.pow(radius, 2)) + (Math.PI * radius * slantHeight).toFixed(2));  
            } 
             
        </script>
    </body>
</html>
