<!DOCTYPE html>
<html>
<head>
	<title>Pine Peaks Ski Lodge</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	
	<!-- The following is a conditional comment recognized only by IE 'lt' means lower than.
	HTML5Shiv is a JavaScript workaround, created by Sjoerd Visscher, to enable styling
	of HTML5 elements in versions of Internet Explorer prior to version 9,
	which do not allow unknown elements to be styled without JavaScript.

	From <https://www.bing.com/search?q=why+use+html5+shiv&src=IE-SearchBox&FORM=IESR02>  -->
	<!--[if lt IE 9]>
	  <script src="https://oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>
	  <![endif]-->
	  
	  <link rel="stylesheet" type="text/css" href="PinePeaks_StyleSheet.css">
	  
</head> 
	 <!--HTML that has the form attributes --> 
	<body onload="init()">   
		<header>
			<h1>Pine Peaks Wind Chill Calculator</h1>
		</header>
		<p><img src = "Lodge.PNG" alt="Banner for Pine Peaks Ski Lodge"/><p> 
		 
			<form name="frmWindChillCalculator">
				<section id="formContainer">
					<label for="outDoorTemp">Enter the outdoor temperature</label>
                                        <input type="number" id="outdoorTemp" class="textbox"> 
					<label for="avgWindSpeed">Enter the average windspeed</label>
                                        <input type="number" id="avgWindSpeed" class="textbox"> 
					<label for="windChill">The wind chill is: </label> 
                                        <input type="number" id="windChill" class="textbox"> </input>
					<input type="button" id="calcButton" class="buttons" value="Calculate">
					<input type="button" id="resetButton" class="buttons" value="Reset"> 
				</section>  
			</form>   
		
	<!-- 
	Linking to JQuery via CDN (Content Delivery network) method 
	NOTE: LINK TO THE JQUERY FILE FIRST, BEFORE LINKING TO THE MY JS CODE
	-->
	<script	language="JavaScript" type="text/javascript" src="http://ajax.googleapis.com/ajax/libs/jquery/1.8.2/jquery.min.js"></script>
	  
	<!-- Linking to my JavaScript file -->
	<script language="JavaScript" type="text/javascript" src="PinePeaksScript.js"></script>  
	
	</body>
</html>
