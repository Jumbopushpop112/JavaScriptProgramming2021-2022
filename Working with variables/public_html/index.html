<html>
    <head>
        <title>Primitive Data Types</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <script>
            /*Data types
             numbers - integers (whole numbers), float (decimal numbers)
             boolean - true or false (2 values)
             let - variable is going to change throughout the code
             const - variable that cannot be changed
             variable decleration var length = 20;
             to alert, use alert(length);
             valid variable names
             -use camel case convention myEmployeeNumber (make sure they are meaningful) (no spaces) (cannot start with a number) (be careful with special characters) 
             */
            let length = 20;  
            const width = 10; 
            var isSunny = false;
            var name = "Jeff";
            alert(length);
            alert(width); 
            alert(isSunny); 
            alert(name);  
        </script> 
    </body>
</html>
